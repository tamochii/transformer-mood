<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech Emotion Classifier</title>
  <style>
    :root {
      --bg: #101010;
      --panel: #171717;
      --panel-alt: #121212;
      --border: #313131;
      --border-strong: #4a4a4a;
      --text: #b8b8b8;
      --text-bright: #f3f3f3;
      --text-dim: #7a7a7a;
      --accent: #c59d3d;
      --danger: #d06363;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      margin: 0;
      padding: 28px 18px;
      font-size: 13px;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-strong);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      color: var(--text-bright);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }
    .sys-info {
      color: var(--text-dim);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 16px;
    }
    .panel-header {
      color: var(--text-bright);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    button, input[type="file"]::file-selector-button {
      background: #202020;
      color: var(--text-bright);
      border: 1px solid var(--border-strong);
      padding: 9px 12px;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
      font-family: inherit;
      letter-spacing: 0.04em;
    }
    button:hover:not(:disabled), input[type="file"]::file-selector-button:hover { background: #282828; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      font-weight: 700;
    }
    button.primary:hover:not(:disabled) { background: #d3af59; }
    button.danger { color: var(--danger); border-color: #784545; background: transparent; }
    button.danger:hover:not(:disabled) { background: rgba(208, 99, 99, 0.08); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    input[type="file"] {
      width: 100%;
      color: var(--text);
      font-size: 12px;
      padding: 9px 0;
    }

    .status-bar {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 12px;
      color: var(--text-dim);
      min-height: 18px;
    }

    .audio-preview-box {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      background: var(--panel-alt);
      border: 1px solid var(--border);
      padding: 10px;
    }
    .audio-name {
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }
    audio {
      width: 100%;
      height: 30px;
      filter: grayscale(1) contrast(1.1);
    }

    .results { display: none; grid-template-columns: 220px 1fr; gap: 14px; }
    .results.visible { display: grid; }
    .summary-box, .scores-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px;
    }
    .summary-main {
      font-size: 26px;
      color: var(--text-bright);
      text-transform: uppercase;
      margin-bottom: 14px;
      letter-spacing: 0.08em;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }
    .summary-key {
      color: var(--text-dim);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.06em;
    }
    .summary-value {
      color: var(--text-bright);
      text-align: right;
      word-break: break-word;
    }

    .scores-header {
      color: var(--text-bright);
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
    }
    .prob-item { margin-bottom: 10px; }
    .prob-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .prob-bar { background: #262626; height: 6px; width: 100%; }
    .prob-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s ease; }

    @media (max-width: 600px) {
      body { padding: 18px 12px; }
      .header { align-items: flex-start; flex-direction: column; }
      .sys-info { text-align: left; }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls input[type="file"] { grid-column: 1 / -1; }
      .audio-preview-box {
        grid-template-columns: 1fr;
      }
      .results { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Transformer Mood</h1>
      <div class="sys-info">DEVICE: {{ device }} | FFMPEG: {{ "OK" if ffmpeg_ready else "N/A" }}</div>
    </div>

    <div class="panel">
      <div class="panel-header">Input</div>
      <div class="controls">
        <input id="file-input" type="file" accept="audio/*">
        <button id="record-start">Record</button>
        <button id="record-stop" class="danger" disabled>Stop</button>
        <button id="clear">CLEAR</button>
      </div>
      <div id="status" class="status-bar">> AWAITING INPUT...</div>
      <div class="audio-preview-box">
        <span id="audio-name" class="audio-name">NO AUDIO</span>
        <audio id="audio-preview" controls></audio>
        <button id="analyze" class="primary" disabled>Run</button>
      </div>
    </div>

    <div id="result-shell" class="results">
      <div class="summary-box">
        <div id="prediction-value" class="summary-main">-</div>
        <div class="summary-row">
          <span class="summary-key">Score</span>
          <span id="confidence-value" class="summary-value">-</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">File</span>
          <span id="filename-value" class="summary-value">-</span>
        </div>
      </div>
      <div class="scores-box">
        <div class="scores-header">Scores</div>
        <div id="prob-list"></div>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const startButton = document.getElementById('record-start');
    const stopButton = document.getElementById('record-stop');
    const analyzeButton = document.getElementById('analyze');
    const clearButton = document.getElementById('clear');
    const statusBox = document.getElementById('status');
    const audioName = document.getElementById('audio-name');
    const audioPreview = document.getElementById('audio-preview');
    const resultShell = document.getElementById('result-shell');
    const predictionValue = document.getElementById('prediction-value');
    const confidenceValue = document.getElementById('confidence-value');
    const filenameValue = document.getElementById('filename-value');
    const probList = document.getElementById('prob-list');

    let currentAudioFile = null;
    let currentAudioUrl = null;
    let mediaRecorder = null;
    let mediaStream = null;
    let recordChunks = [];
    let recordStartedAt = 0;
    let timerId = null;

    function setStatus(msg) {
      statusBox.textContent = `> ${msg}`;
    }

    function resetResults() {
      resultShell.classList.remove('visible');
      predictionValue.textContent = '-';
      confidenceValue.textContent = '-';
      filenameValue.textContent = '-';
      probList.innerHTML = '';
    }

    function setCurrentAudio(file, label) {
      currentAudioFile = file;
      analyzeButton.disabled = false;
      audioName.textContent = label;
      resetResults();

      if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
      currentAudioUrl = URL.createObjectURL(file);
      audioPreview.src = currentAudioUrl;
      audioPreview.load();
      setStatus(`LOADED: ${label}`);
    }

    function clearCurrentAudio() {
      currentAudioFile = null;
      analyzeButton.disabled = true;
      fileInput.value = '';
      audioName.textContent = 'NO AUDIO';
      resetResults();
      audioPreview.removeAttribute('src');
      audioPreview.load();
      if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
      setStatus('AWAITING INPUT...');
    }

    function pickRecordingMimeType() {
      const candidates = ['audio/webm;codecs=opus', 'audio/ogg;codecs=opus', 'audio/webm', 'audio/ogg'];
      return candidates.find(item => window.MediaRecorder && MediaRecorder.isTypeSupported(item)) || '';
    }

    async function startRecording() {
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        setStatus('ERROR: MIC NOT SUPPORTED'); return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordChunks = [];
        const mimeType = pickRecordingMimeType();
        mediaRecorder = mimeType ? new MediaRecorder(mediaStream, { mimeType }) : new MediaRecorder(mediaStream);

        mediaRecorder.addEventListener('dataavailable', e => {
          if (e.data.size > 0) recordChunks.push(e.data);
        });

        mediaRecorder.addEventListener('stop', () => {
          if (timerId) clearInterval(timerId);
          const finalMimeType = mediaRecorder.mimeType || mimeType || 'audio/webm';
          const ext = finalMimeType.includes('ogg') ? 'ogg' : finalMimeType.includes('wav') ? 'wav' : 'webm';
          const file = new File([new Blob(recordChunks, { type: finalMimeType })], `rec.${ext}`, { type: finalMimeType });
          setCurrentAudio(file, `MIC_RECORDING.${ext}`);
          mediaStream.getTracks().forEach(t => t.stop());
          startButton.disabled = false; stopButton.disabled = true;
        });

        recordStartedAt = Date.now();
        timerId = setInterval(() => {
          const sec = Math.floor((Date.now() - recordStartedAt)/1000);
          setStatus(`RECORDING... [${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}]`);
        }, 500);

        mediaRecorder.start();
        startButton.disabled = true; stopButton.disabled = false;
        setStatus('RECORDING... [00:00]');
      } catch (err) {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        setStatus(`ERROR: ${err.message.toUpperCase()}`);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop(); setStatus('PROCESSING RECORDING...');
      }
    }

    function renderResult(data) {
      resultShell.classList.add('visible');
      predictionValue.textContent = data.predicted_emotion_zh;
      confidenceValue.textContent = `${(data.confidence * 100).toFixed(2)}%`;
      filenameValue.textContent = data.filename;

      probList.innerHTML = '';
      data.probabilities.forEach(item => {
        probList.innerHTML += `
          <div class="prob-item">
            <div class="prob-header">
              <span>${item.emotion_zh}</span>
              <span>${(item.probability * 100).toFixed(2)}%</span>
            </div>
            <div class="prob-bar"><div class="prob-fill" style="width: ${(item.probability * 100).toFixed(2)}%"></div></div>
          </div>
        `;
      });
    }

    async function analyzeCurrentAudio() {
      if (!currentAudioFile) return;
      analyzeButton.disabled = true;
      resetResults();
      setStatus('ANALYZING...');

      try {
        const formData = new FormData();
        formData.append('audio', currentAudioFile, currentAudioFile.name);
        const res = await fetch('/api/predict', { method: 'POST', body: formData });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.detail || 'API ERROR');

        renderResult(payload);
        setStatus(`SUCCESS: ${payload.predicted_emotion_zh}`);
      } catch (err) {
        setStatus(`ERROR: ${err.message.toUpperCase()}`);
      } finally {
        analyzeButton.disabled = !currentAudioFile;
      }
    }

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) setCurrentAudio(file, file.name.toUpperCase());
    });

    startButton.addEventListener('click', startRecording);
    stopButton.addEventListener('click', stopRecording);
    analyzeButton.addEventListener('click', analyzeCurrentAudio);
    clearButton.addEventListener('click', clearCurrentAudio);
  </script>
</body>
</html>
